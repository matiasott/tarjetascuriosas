<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Título de la pestaña -->
    <title>SmartHome Inventory</title>

    <!-- Favicon (Icono de la pestaña) -->
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/qr-code.png">

    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background: #0b0f19; /* Color oscuro para que no haya destellos blancos */
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
        }
        #loader { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #0b0f19; 
            color: #3b82f6; /* Azul primario */
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            z-index: 999;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(59, 130, 246, 0.1);
            border-radius: 50%;
            border-top-color: #3b82f6;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 15px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .text {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: bold;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <!-- Pantalla de carga profesional -->
    <div id="loader">
        <div class="spinner"></div>
        <div class="text">SmartHome Inventory</div>
    </div>
    
    <!-- El iframe cargará dinámicamente la URL con parámetros -->
    <iframe id="appFrame" src="" onload="document.getElementById('loader').style.display='none'"></iframe>

    <script>
        // 1. URL de tu Web App de Google Apps Script
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzn8dSSQHSJCV0Wje9ttZlrwr6rWUTPLjPk49mBHoPlpoFljmkV7SbPUSY8iPKAn3dxGA/exec";

          // 2. Capturar los parámetros de la URL de GitHub (ej: ?o=123)
        // Cambia esto en tu index.html de GitHub:
        const urlParams = new URLSearchParams(window.location.search);
        const objectId = urlParams.get('o') || urlParams.get('id'); // Acepta 'o' o 'id'

        // 3. Construir la URL final para el iframe
        let finalUrl = APPS_SCRIPT_URL;
        if (objectId) {
            // Pasamos el parámetro 'o' a la app de Google
            finalUrl += (finalUrl.includes('?') ? '&' : '?') + "o=" + objectId;
        }

        // 4. Asignar la URL al iframe para iniciar la carga
        document.getElementById('appFrame').src = finalUrl;
    </script>
</body>
</html>
